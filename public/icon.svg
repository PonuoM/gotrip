<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background: brand red with rounded corners (Android adaptive icons use the safe zone in the center 80%) -->
  <rect width="512" height="512" rx="96" fill="#E63946"/>

  <!-- Big G in the brand black at the safe-zone scale -->
  <text
    x="256" y="345"
    font-family="Inter, 'Helvetica Neue', system-ui, sans-serif"
    font-size="320" font-weight="900"
    fill="#FFFFFF"
    text-anchor="middle"
    letter-spacing="-12"
  >G</text>

  <!-- Tiny airplane echoing the brand's "go" feel -->
  <g transform="translate(370 380) rotate(-30) scale(2.6)" fill="#1A1A1A">
    <path d="M2 11 L20 2 L18 6 L8 11 L18 16 L20 20 Z"/>
  </g>
</svg>
